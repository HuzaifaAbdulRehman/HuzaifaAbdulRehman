name: Generate contribution snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23c25a1e&color_dots=%23ddd7c9,%23e2ead9,%23a9c9b3,%236f9e7f,%233d6b52
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ff8a3d&color_dots=%232a2d31,%2312261c,%231e3d2c,%23368a5f,%236fcf9e

      - name: Push snake SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
