<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="310" viewBox="0 0 1000 310" role="img" aria-labelledby="title description">
  <title id="title">Technology toolkit</title>
  <desc id="description">Web, artificial intelligence, data, and engineering technologies</desc>
  <defs><linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs>
  <rect x="1" y="1" width="998" height="308" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect x="1" y="1" width="998" height="7" rx="3.5" fill="url(#accent)"/>
  <text x="48" y="57" fill="#f0f6fc" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Technology toolkit</text>
  <text x="48" y="86" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="16">Tools I use to move from product interface to tested implementation.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="48" y="136" fill="#d8b4fe" font-size="15" font-weight="700">WEB</text>
    <text x="48" y="169" fill="#f0f6fc" font-size="18">React  |  Next.js  |  TypeScript  |  Tailwind CSS</text>
    <text x="48" y="218" fill="#67e8f9" font-size="15" font-weight="700">AI AND COMPUTER VISION</text>
    <text x="48" y="251" fill="#f0f6fc" font-size="18">Python  |  TensorFlow  |  OpenCV  |  MediaPipe  |  XGBoost</text>
    <text x="570" y="136" fill="#7ee787" font-size="15" font-weight="700">DATA AND ENGINEERING</text>
    <text x="570" y="169" fill="#f0f6fc" font-size="18">MySQL  |  Drizzle ORM  |  Git  |  GitHub Actions</text>
    <text x="570" y="218" fill="#ffa657" font-size="15" font-weight="700">ALSO WORKED WITH</text>
    <text x="570" y="251" fill="#f0f6fc" font-size="18">NetworkX  |  Streamlit  |  C  |  C++</text>
  </g>
</svg>
